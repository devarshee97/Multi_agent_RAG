name: Trigger auto deployment for ragagent

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/ragagent-AutoDeployTrigger-717aea34-f4b2-49bd-be20-2c87ea9116c8.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.RAGAGENT_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.RAGAGENT_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.RAGAGENT_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: myapprag.azurecr.io
          registryUsername: ${{ secrets.RAGAGENT_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.RAGAGENT_REGISTRY_PASSWORD }}
          containerAppName: ragagent
          resourceGroup: test_dev
          imageToBuild: myapprag.azurecr.io/ragagent:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


